<!DOCTYPE html>
<html lang="ko" data-theme="portfolio">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b0e14">
  <title>{% block title %}포트폴리오 매니저{% endblock %}</title>
  <link rel="icon" href="/static/favicon.ico" sizes="any">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/app.css">
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js" defer></script>
  <script src="/static/js/app.js" defer></script>
</head>
<body class="bg-base-100 text-base-content min-h-screen">
  <a class="skip-link" href="#main-content">본문으로 건너뛰기</a>

  <header class="navbar bg-base-200 border-b border-base-300 sticky top-0 z-30 px-4 min-h-12">
    <div class="navbar-start">
      <span class="text-xs font-bold tracking-widest uppercase text-base-content">Portfolio Manager</span>
    </div>
    <nav class="navbar-end" aria-label="주요 메뉴">
      <ul class="menu menu-horizontal gap-0.5 text-sm px-0">
        <li>
          <a href="/"
             class="{% if active_page == 'dashboard' %}bg-primary text-primary-content{% endif %} rounded-md px-3 py-1.5 text-xs font-semibold"
             {% if active_page == 'dashboard' %}aria-current="page"{% endif %}>
            대시보드
          </a>
        </li>
        <li>
          <a href="/groups"
             class="{% if active_page == 'groups' %}bg-primary text-primary-content{% endif %} rounded-md px-3 py-1.5 text-xs font-semibold"
             {% if active_page == 'groups' %}aria-current="page"{% endif %}>
            그룹
          </a>
        </li>
        <li>
          <a href="/accounts"
             class="{% if active_page == 'accounts' %}bg-primary text-primary-content{% endif %} rounded-md px-3 py-1.5 text-xs font-semibold"
             {% if active_page == 'accounts' %}aria-current="page"{% endif %}>
            계좌
          </a>
        </li>
        <li>
          <a href="/deposits"
             class="{% if active_page == 'deposits' %}bg-primary text-primary-content{% endif %} rounded-md px-3 py-1.5 text-xs font-semibold"
             {% if active_page == 'deposits' %}aria-current="page"{% endif %}>
            입금
          </a>
        </li>
        <li>
          <a href="/rebalance"
             class="{% if active_page == 'rebalance' %}bg-primary text-primary-content{% endif %} rounded-md px-3 py-1.5 text-xs font-semibold"
             {% if active_page == 'rebalance' %}aria-current="page"{% endif %}>
            리밸런싱
          </a>
        </li>
      </ul>
    </nav>
  </header>

  <main id="main-content" class="max-w-7xl mx-auto px-4 py-4">
    <div id="app-live-region" class="sr-only" aria-live="polite" aria-atomic="true"></div>
    <p id="app-request-status" class="text-xs text-base-content/40 min-h-4 mb-1" aria-live="polite"></p>

    {% if flash_message %}
    <div role="status" aria-live="polite"
         class="alert {% if flash_type == 'error' %}alert-error{% else %}alert-success{% endif %} mb-4 text-sm py-2">
      <span>{{ flash_message }}</span>
    </div>
    {% endif %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
