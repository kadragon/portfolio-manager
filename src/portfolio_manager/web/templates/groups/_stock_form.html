<tr id="stock-{{ stock.id }}">
  <td>
    <label class="sr-only" for="stock-ticker-{{ stock.id }}">티커</label>
    <input id="stock-ticker-{{ stock.id }}"
           type="text"
           name="ticker"
           value="{{ stock.ticker }}"
           required
           autocomplete="off"
           class="input input-bordered input-sm uppercase">
  </td>
  <td>
    <label class="sr-only" for="stock-group-{{ stock.id }}">그룹 이동</label>
    <select id="stock-group-{{ stock.id }}" name="target_group_id" class="select select-bordered select-sm">
      {% for group in groups %}
      <option value="{{ group.id }}" {% if group.id == stock.group_id %}selected{% endif %}>
        {{ group.name }}
      </option>
      {% endfor %}
    </select>
  </td>
  <td>
    <div class="flex flex-wrap gap-1.5">
      <button type="button"
              class="btn btn-primary btn-sm"
              hx-put="/groups/{{ group_id }}/stocks/{{ stock.id }}"
              hx-include="closest tr"
              hx-target="closest tr"
              hx-swap="outerHTML"
              data-request-message="종목 정보를 저장하는 중…">
        저장
      </button>
      <button type="button"
              class="btn btn-ghost btn-xs"
              hx-get="/groups/{{ group_id }}/stocks/{{ stock.id }}"
              hx-target="closest tr"
              hx-swap="outerHTML"
              data-request-message="수정 취소 중…">
        취소
      </button>
    </div>
  </td>
</tr>
