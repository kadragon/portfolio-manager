<tr id="account-{{ account.id }}">
  <td>{{ account.name }}</td>
  <td class="text-right font-mono">{{ account.cash_balance | format_krw }}</td>
  <td>
    <div class="flex flex-wrap gap-1.5">
      <button type="button"
              class="btn btn-ghost btn-xs"
              hx-get="/accounts/{{ account.id }}/edit"
              hx-target="closest tr"
              hx-swap="outerHTML"
              data-request-message="계좌 수정 폼을 여는 중…">
        수정
      </button>
      <a href="/accounts/{{ account.id }}/holdings" class="btn btn-ghost btn-xs">보유 내역</a>
      {% if account.kis_account_no %}
      <button type="button"
              class="btn btn-ghost btn-xs"
              hx-post="/accounts/{{ account.id }}/sync"
              hx-target="#sync-result-{{ account.id }}"
              hx-swap="outerHTML"
              data-request-message="KIS 계좌를 동기화하는 중…">
        KIS 동기화
      </button>
      {% endif %}
      <button type="button"
              class="btn btn-error btn-xs"
              hx-delete="/accounts/{{ account.id }}"
              hx-target="closest tr"
              hx-swap="outerHTML"
              hx-confirm="'{{ account.name }}' 계좌를 삭제하시겠습니까? (보유 내역도 함께 삭제됩니다)"
              data-request-message="계좌를 삭제하는 중…">
        삭제
      </button>
    </div>
  </td>
</tr>
<tr id="sync-result-{{ account.id }}"></tr>
