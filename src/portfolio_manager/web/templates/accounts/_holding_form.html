<tr id="holding-{{ holding.id }}">
  {% set ticker = stock_map[holding.stock_id].ticker if holding.stock_id in stock_map else holding.stock_id %}
  {% set stock_name = stock_name_map[holding.stock_id] if holding.stock_id in stock_name_map else ticker %}
  <td>
    <form id="edit-holding-{{ holding.id }}"
          hx-put="/accounts/{{ account_id }}/holdings/{{ holding.id }}"
          hx-target="closest tr"
          hx-swap="outerHTML"
          data-request-message="보유 수량을 저장하는 중…">
      <code class="text-xs bg-base-300 px-1.5 py-0.5 rounded">{{ ticker }}</code>
  </td>
  <td>{{ stock_name }}</td>
  <td>
      <label class="sr-only" for="holding-qty-{{ holding.id }}">수량</label>
      <input id="holding-qty-{{ holding.id }}" type="number" name="quantity" value="{{ holding.quantity }}"
             min="0" step="0.000001" required autocomplete="off" class="input input-bordered input-sm">
  </td>
  <td>
      <div class="flex flex-wrap gap-1.5">
        <button type="submit" class="btn btn-primary btn-sm">저장</button>
        <button type="button"
                class="btn btn-ghost btn-xs"
                hx-get="/accounts/{{ account_id }}/holdings/{{ holding.id }}"
                hx-target="closest tr"
                hx-swap="outerHTML"
                data-request-message="수정 취소 중…">
          취소
        </button>
      </div>
    </form>
  </td>
</tr>
