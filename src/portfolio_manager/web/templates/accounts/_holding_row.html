<tr id="holding-{{ holding.id }}">
  {% set ticker = stock_map[holding.stock_id].ticker if holding.stock_id in stock_map else holding.stock_id %}
  {% set stock_name = stock_name_map[holding.stock_id] if holding.stock_id in stock_name_map else ticker %}
  <td>
    <code class="text-xs bg-base-300 px-1.5 py-0.5 rounded">{{ ticker }}</code>
    <input type="hidden" name="holding_id" value="{{ holding.id }}">
  </td>
  <td>{{ stock_name }}</td>
  <td class="text-right font-mono">
    <label class="sr-only" for="holding-qty-inline-{{ holding.id }}">수량</label>
    <input id="holding-qty-inline-{{ holding.id }}"
           type="number"
           name="quantity"
           value="{{ holding.quantity }}"
           min="0.000001"
           step="0.000001"
           required
           autocomplete="off"
           class="input input-bordered input-sm">
  </td>
  <td>
    <div class="flex flex-wrap gap-1.5">
      <button type="button"
              class="btn btn-error btn-xs"
              hx-delete="/accounts/{{ account_id }}/holdings/{{ holding.id }}"
              hx-target="closest tr"
              hx-swap="outerHTML"
              hx-confirm="보유 내역을 삭제하시겠습니까?"
              data-request-message="보유 내역을 삭제하는 중…">
        삭제
      </button>
    </div>
  </td>
</tr>
