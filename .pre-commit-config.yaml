repos:
  - repo: local
    hooks:
      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run
        language: system
        types: [go]
        pass_filenames: false
        stages: [pre-commit]

      - id: go-test
        name: go test
        entry: go test ./...
        language: system
        types: [go]
        pass_filenames: false
        stages: [pre-commit]
        always_run: true

      - id: templ-check
        name: templ generate --check
        entry: /Users/kadragon/go/bin/templ generate --check
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: sqlc-diff
        name: sqlc diff
        entry: /Users/kadragon/go/bin/sqlc diff
        language: system
        pass_filenames: false
        stages: [pre-commit]
