name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@latest

      - name: Install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest

      - name: templ generate
        run: templ generate

      - name: sqlc diff
        run: sqlc diff

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

      - name: go build
        run: go build ./...

      - name: go test (coverage gate 85%)
        run: |
          PKGS=$(go list ./... | grep -vE '/(db/sqlc|cmd|container|models|web/templates)($|/)' | tr '\n' ' ')
          go test $PKGS -coverprofile=coverage.out -covermode=atomic
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%","",$3); print $3}')
          echo "total coverage: ${total}%"
          awk "BEGIN { exit (${total} < 85.0) }" || { echo "coverage below 85%"; exit 1; }
